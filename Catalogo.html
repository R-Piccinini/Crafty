<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogo</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="popup/popup.css">
    <link rel="stylesheet" href="css/general.css">
    <link rel="stylesheet" href="css/catalogo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&amp;display=swap" rel="stylesheet">
</head>

<body class="overflow-x-hidden" onload="loadTemplate()">
    <header>
    </header>

    <div class="contenuto">
        <section class="layout2">
            <div class="sidebar  m-3 h-100 ">
                <ul class="list-group">
                    <li class="list-group-item fw-medium">
                        <h5>Categorie</h5>
                        <label class="cr-wrapper">
                            <input type="checkbox" />
                            <div class="cr-input"></div>
                            <span>Categoria 1</span>
                        </label>
                        <label class="cr-wrapper ">
                            <input type="checkbox" />
                            <div class="cr-input"></div>
                            <span class="">Categoria 2</span>
                        </label>
                        <label class="cr-wrapper">
                            <input type="checkbox" />
                            <div class="cr-input"></div>
                            <span>Categoria 3</span>
                        </label>
                        <label class="cr-wrapper">
                            <input type="checkbox" />
                            <div class="cr-input"></div>
                            <span>Categoria 4</span>
                        </label>
                        <label class="cr-wrapper">
                            <input type="checkbox" />
                            <div class="cr-input"></div>
                            <span>Categoria 5</span>
                        </label>

                    </li>
                    <li class="list-group-item fw-medium">
                        <h5>Valutazione</h5>
                        <div class="rating" id="rating">
                            <input type="radio" name="star" id="star-1" value="1" />
                            <label for="star-1">
                                <span> ★ </span>
                            </label>

                            <input type="radio" name="star" id="star-2" value="2" />
                            <label for="star-2">
                                <span> ★ </span>
                            </label>

                            <input type="radio" name="star" id="star-3" value="3" />
                            <label for="star-3">
                                <span> ★ </span>
                            </label>

                            <input type="radio" name="star" id="star-4" value="4" />
                            <label for="star-4">
                                <span> ★ </span>
                            </label>

                            <input type="radio" name="star" id="star-5" value="5" />
                            <label for="star-5">
                                <span> ★ </span>
                            </label>
                        </div>
                    </li>
                    <li class="list-group-item border-bottom-0 fw-medium">
                        <h5>Prezzo</h5>
                        <label class="cr-wrapper">
                            <input class="form-check-input" name="flexRadioDefault" type="radio" />
                            <div class="cr-input"></div>
                            <span>Meno di 25€ </span>
                        </label>
                        <label class="cr-wrapper">
                            <input class="form-check-input" name="flexRadioDefault" type="radio" />
                            <div class="cr-input"></div>
                            <span>da 25€ a 50€</span>
                        </label>
                        <label class="cr-wrapper">
                            <input class="form-check-input" name="flexRadioDefault" type="radio" />
                            <div class="cr-input"></div>
                            <span>da 50€ a 75€</span>
                        </label>
                        <label class="cr-wrapper">
                            <input class="form-check-input" name="flexRadioDefault" type="radio" />
                            <div class="cr-input"></div>
                            <span>da 75€ a 100€</span>
                        </label>
                        <label class="cr-wrapper">
                            <input class="form-check-input" name="flexRadioDefault" type="radio" />
                            <div class="cr-input"></div>
                            <span>Oltre 100€</span>
                        </label>

                    </li>
                </ul>
            </div>

            <div class="grow2">
                <div class="container text-center bg-none">
                    <div class="row m-1">
                        <div class=" col-12 col-sm-4 col-md-3 ">
                            <div class="card rounded">
                                <img src="assets/img/products/coperta.png" class="card-img-top rounded"
                                    alt="...">
                                <div class="card-body">
                                   <a class="stretched-link text-decoration-none" href=""> <h5 class="card-title">Coperta tessuta astratta</h6></a>
                                    <p class="card-text">5.4★</p>
                                    <p class="card-text"></p>
                                    <h6>69,99€</h6>

                                </div>
                            </div>
                        </div>

                    </div>
                </div>

            </div>
        </section>
    </div>

    <footer>

    </footer>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/jquery-3.7.1.min.js"></script>
    <script src="https://kit.fontawesome.com/4bea790e60.js" crossorigin="anonymous"></script>
    <script src="popup/popup.js"></script>
    <script src="js/template.js"></script>
</body>

</html>
